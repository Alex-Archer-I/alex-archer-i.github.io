<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/style.css">
    <title>Test 1</title>
</head>
<body>
    <div class="main">
        <div class="container">
            <div class="header">шесть факторов профессиональной защиты.</div>
            <div class="polygon">
                <img src="img/Polygon.svg" alt="polygon" class="polygon-img">
                <div class="text-dot">
                    <div class="text text-desk text-top">ПОДХОДИТ ДЛЯ HI_TECH МАТЕРИАЛОВ_ </div>
                </div>
                <div class="text-dot">
                    <div class="text text-desk text-right">ЗАЩИТА БЕЛОГО ЦВЕТА / <br>ТЕХНОЛОГИЯ EXTRA WHITE_
                        </div>
                </div>
                <div class="text-dot">
                    <div class="text text-desk text-right">ЕВРОПЕЙСКИЕ ИННОВАЦИИ_</div>
                </div>
                <div class="text-dot">
                    <text class="text text-desk text-bottom">_СОЗДАН ДЛЯ РОССИИ / <br>РАЗРАБОТАН ДЛЯ ЭКСТРЕМАЛЬНЫХ  УСЛОВИЙ</text>
                </div>

                </div>
                <div class="text-dot">
                    <div class="text text-desk text-left">_УНИКАЛЬНОСТЬ / <br>ЗАПАТЕНТОВАННЫЕ ТЕХНОЛОГИИ</div>
                </div>
            </div>
            <div class="swipe">
                <div class="text text-mobile"></div>
                <span class="icon-arrow-left2 moving"></span>
                <img class="moving" src="img/Pointer.svg" alt="pointer">
                <span class="icon-arrow-right2 moving"></span>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>

</html>
