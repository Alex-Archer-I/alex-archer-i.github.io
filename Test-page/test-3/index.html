<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>Test 3</title>
</head>
<body>
    <div class="main">
        <div class="container">
            <div class="header-cat">
                <img src="img/GreatCat.png" alt="Great Cat">
            </div>
            <div class="slider slider-one">
                <div class="line line-one">
                    <img src="img/slider-first/slider-first-one.png" alt="slider-img">
                    <img src="img/slider-first/slider-first-two.png" alt="slider-img">
                    <img src="img/slider-first/slider-first-three.png" alt="slider-img">
                </div>
                <div class="number number-right">01</div>
                <div class="text text-right">BRAND</div>
            </div>
            <div class="slider slider-two">
                <div class="line line-two">
                    <img src="img/slider-second/slider-second-one.png" alt="">
                    <img src="img/slider-second/slider-second-two.png" alt="">
                    <img src="img/slider-second/slider-second-three.png" alt="">
                    <img src="img/slider-second/slider-second-four.png" alt="">
                    <img src="img/slider-second/slider-second-five.png" alt="">
                    <img src="img/slider-second/slider-second-six.png" alt="">
                    <img src="img/slider-second/slider-second-seven.png" alt="">
                    <img src="img/slider-second/slider-second-eight.png" alt="">
                </div>
                <div class="number number-left">02</div>
                <div class="text text-left">CONTENT PRODUCTION</div>
            </div>
            <div class="slider slider-three">
                <div class="line line-three">
                    <img src="img/slider-third/slider-third-one.png" alt="">
                    <img src="img/slider-third/slider-third-two.png" alt="">
                    <img src="img/slider-third/slider-third-three.png" alt="">
                    <img src="img/slider-third/slider-third-four.png" alt="">
                    <img src="img/slider-third/slider-third-five.png" alt="">
                    <img src="img/slider-third/slider-third-six.png" alt="">
                </div>
                <div class="number number-right">03</div>
                <div class="text text-right">DIGITAL</div>
            </div>

            <div class="another-cat">
                <img src="img/cat.jpg" alt="">
            </div>
        </div>
    </div>

    <script src="js/slider.js"></script>
</body>
</html>
